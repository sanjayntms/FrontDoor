<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Azure Global App Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-purple: #4a148c;
            --accent-blue: #0277bd;
            --accent-green: #2e7d32;
            --bg-gradient: linear-gradient(145deg, #f0f4f8, #d9e2ec);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #102a43;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .meta-info {
            background: white;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            display: inline-block;
            margin-top: 10px;
        }

        /* Container for Chart and Table */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            margin-bottom: 30px;
        }

        .viz-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            height: 400px;
        }

        /* Table Styling */
        .table-container {
            overflow-y: auto;
            height: 400px;
            background: white;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            color: var(--primary-purple);
            padding: 15px;
            z-index: 10;
        }

        td { padding: 12px; border-bottom: 1px solid #f0f4f8; text-align: center; }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            width: 95%;
            max-width: 1400px;
        }

        .img-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .img-card:hover { transform: translateY(-5px); }
        .img-card img { width: 100%; height: 120px; object-fit: cover; }
        .img-meta { font-size: 0.75rem; padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>Azure App Performance Analytics</h1>
        <div class="meta-info">
            <strong>Server:</strong> {{{SERVER_NAME}}} | <strong>Node:</strong> {{{LOCATION}}} | 
            <span id="cache-status">CDN: Checking...</span>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="viz-card">
            <canvas id="latencyChart"></canvas>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th>Cached</th>
                        <th>Uncached</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="gallery" class="gallery"></div>

<script>
    const CONFIG = { imageCount: 15, basePath: '/images/image-' };
    let chart;

    // Initialize Chart.js
    function initChart() {
        const ctx = document.getElementById('latencyChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Cached (ms)',
                        data: [],
                        backgroundColor: 'rgba(46, 125, 50, 0.6)',
                        borderColor: 'rgb(46, 125, 50)',
                        borderWidth: 1
                    },
                    {
                        label: 'Uncached (ms)',
                        data: [],
                        backgroundColor: 'rgba(2, 119, 189, 0.6)',
                        borderColor: 'rgb(2, 119, 189)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, title: { display: true, text: 'Milliseconds' } } },
                plugins: { title: { display: true, text: 'Real-time Latency Comparison' } }
            }
        });
    }

    async function measureImage(id) {
        try {
            // Measure Cached
            const s1 = performance.now();
            await loadImage(`${CONFIG.basePath}${id}.jpg`);
            const cachedTime = (performance.now() - s1).toFixed(2);

            // Measure Uncached
            const s2 = performance.now();
            await loadImage(`${CONFIG.basePath}${id}.jpg?cb=${Date.now()}`);
            const uncachedTime = (performance.now() - s2).toFixed(2);

            updateUI(id, cachedTime, uncachedTime, 'Success');
        } catch (e) {
            updateUI(id, 0, 0, 'Failed');
        }
    }

    function loadImage(src) {
        return new Promise((res, rej) => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = rej;
        });
    }

    function updateUI(id, cached, uncached, status) {
        const name = `img-${id}`;
        
        // 1. Update Table
        const row = document.getElementById('table-body').insertRow();
        row.innerHTML = `<td>${name}</td><td>${cached}ms</td><td>${uncached}ms</td><td>${status === 'Success' ? '✅' : '❌'}</td>`;
        
        // 2. Update Chart
        chart.data.labels.push(name);
        chart.data.datasets[0].data.push(cached);
        chart.data.datasets[1].data.push(uncached);
        chart.update();

        // 3. Update Gallery
        if(status === 'Success') {
            const gal = document.getElementById('gallery');
            const card = document.createElement('div');
            card.className = 'img-card';
            card.innerHTML = `<img src="${CONFIG.basePath}${id}.jpg"><div class="img-meta">#${id}: ${cached}ms</div>`;
            gal.appendChild(card);
        }
    }

    async function checkHeaders() {
        const res = await fetch(window.location.href, { method: 'HEAD' }).catch(() => null);
        if(res) {
            document.getElementById('cache-status').innerText = `CDN: ${res.headers.get('x-cache') || 'HIT'}`;
        }
    }

    // Run
    initChart();
    checkHeaders();
    (async () => {
        for(let i=1; i<=CONFIG.imageCount; i++) {
            await measureImage(i);
        }
    })();
</script>
</body>
</html>
