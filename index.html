<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Azure Global App Image Gallery</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(145deg, #f0f0f0, #d0d0d0);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0; padding: 0;
  display: flex; flex-direction: column; align-items: center;
}
h1 { margin-top: 20px; color: #4a148c; text-shadow: 1px 1px 5px #aaa; }
.server { margin: 10px; font-size: 18px; color: #00695c; font-weight: bold; text-align: center; }

#cache-status {
  font-weight: bold;
  margin-top: 5px;
  text-align: center;
}

/* Dashboard */
.dashboard {
  display: flex; flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  width: 95%;
  margin: 20px 0;
}
.chart-container, .table-container {
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 500px;
  height: 300px;
}
.table-container { padding: 10px; overflow-y: auto; }

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 30px;
  padding: 40px;
  width: 90%;
}
.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transform: perspective(600px) rotateX(5deg) rotateY(-5deg);
  transition: transform 0.3s ease;
}
.card:hover { transform: perspective(600px) rotateX(0) rotateY(0) scale(1.05); }
img { width: 100%; height: 200px; object-fit: cover; }
.info { padding: 15px; text-align: center; font-weight: bold; }

table { width: 100%; border-collapse: collapse; }
th { background: #f3e9fb; padding: 8px; position: sticky; top: 0; }
td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
</style>
</head>

<body>

<h1>NTMS Azure Global App 3D Image Gallery</h1>

<div class="server">
Served by: {{{SERVER_NAME}}}<br>
Location: {{{LOCATION}}}
</div>

<div id="cache-status">Checking cache...</div>

<div class="dashboard">
    <div class="chart-container">
        <canvas id="latencyChart"></canvas>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr><th>#</th><th>Image</th><th>Cache</th><th>Raw</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="gallery" class="gallery"></div>

<script>
const imageCount = 15;
let chart;

function initChart() {
    chart = new Chart(document.getElementById('latencyChart'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [
                { label: 'Cache (ms)', backgroundColor: '#2e7d32', data: [] },
                { label: 'Raw (ms)', backgroundColor: '#0277bd', data: [] }
            ]
        }
    });
}

async function checkCache() {
    try {
        const res = await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });

        const xCache = res.headers.get('x-cache');
        const xCacheInfo = res.headers.get('x-cache-info');
        const azureRef = res.headers.get('x-azure-ref');

        let status = xCache || "UNKNOWN";

        const el = document.getElementById('cache-status');

        el.innerHTML = `
            Cache: ${status}<br>
            Cache Layer: ${xCacheInfo || "N/A"}<br>
            AFD Ref: ${azureRef || "N/A"}
        `;

        if (status.includes("HIT")) el.style.color = "green";
        else if (status.includes("MISS")) el.style.color = "red";
        else el.style.color = "orange";

    } catch {
        document.getElementById('cache-status').innerText = "Cache Status: ERROR";
    }
}

async function runTest() {
    for (let i = 1; i <= imageCount; i++) {
        const name = `image-${i}.jpg`;

        const t0 = performance.now();
        await new Promise(r => { let img = new Image(); img.src = `/images/${name}`; img.onload = r; });
        const cT = (performance.now() - t0).toFixed(2);

        const t1 = performance.now();
        await new Promise(r => { let img = new Image(); img.src = `/images/${name}?nocache=${Date.now()}`; img.onload = r; });
        const rT = (performance.now() - t1).toFixed(2);

        document.getElementById("table-body").innerHTML +=
            `<tr><td>${i}</td><td>${name}</td><td>${cT}ms</td><td>${rT}ms</td></tr>`;

        chart.data.labels.push(i);
        chart.data.datasets[0].data.push(cT);
        chart.data.datasets[1].data.push(rT);
        chart.update();

        document.getElementById("gallery").innerHTML +=
            `<div class="card"><img src="/images/${name}">
             <div class="info">${cT}ms (cache) | ${rT}ms (raw)</div></div>`;
    }
}

window.onload = () => {
    initChart();
    checkCache();
    runTest();
};
</script>

</body>
</html>
