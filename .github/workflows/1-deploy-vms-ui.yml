name: Deploy VMs

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: GlobalApp-rg
  # FIX: Using the full URN to bypass the Azure CLI 'Extra data' bug
  IMAGE: Canonical:0001-com-ubuntu-server-jammy:22_04-lts:latest
  VM_SIZE: Standard_B1s
  ADMIN_USERNAME: azureuser
  VM_PASSWORD: ${{ secrets.VM_PASSWORD }}

jobs:
  create-resources:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create --name $RESOURCE_GROUP --location centralindia

  deploy-vms:
    needs: create-resources
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - LOCATION: centralindia
            VM_NAME: webCI
          - LOCATION: eastus
            VM_NAME: webEU
          - LOCATION: australiaeast
            VM_NAME: webAE
          - LOCATION: northeurope
            VM_NAME: webNE

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create VM (idempotent)
        run: |
          if ! az vm show --name ${{ matrix.VM_NAME }} --resource-group $RESOURCE_GROUP &>/dev/null; then
            az vm create \
              --resource-group $RESOURCE_GROUP \
              --name ${{ matrix.VM_NAME }} \
              --image "$IMAGE" \
              --admin-username "$ADMIN_USERNAME" \
              --admin-password "$VM_PASSWORD" \
              --location ${{ matrix.LOCATION }} \
              --size "$VM_SIZE" \
              --public-ip-sku Standard \
              --authentication-type password \
              --nsg-rule SSH
          fi
          az vm open-port --port 80 --resource-group $RESOURCE_GROUP --name ${{ matrix.VM_NAME }}

  deploy-app-on-all-VMs:
    needs: deploy-vms
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Get VM IPs and Deploy
        run: |
          # Fetch IPs into local variables
          IP_AE=$(az vm show -d -g $RESOURCE_GROUP -n webAE --query publicIps -o tsv)
          IP_CI=$(az vm show -d -g $RESOURCE_GROUP -n webCI --query publicIps -o tsv)
          IP_EU=$(az vm show -d -g $RESOURCE_GROUP -n webEU --query publicIps -o tsv)
          IP_NE=$(az vm show -d -g $RESOURCE_GROUP -n webNE --query publicIps -o tsv)

          for ip in $IP_AE $IP_CI $IP_EU $IP_NE; do
            echo "🚀 Deploying to $ip"
            
            # Transfer files
            sshpass -p "$VM_PASSWORD" scp -o StrictHostKeyChecking=no index.html $ADMIN_USERNAME@$ip:/home/$ADMIN_USERNAME/
            sshpass -p "$VM_PASSWORD" scp -o StrictHostKeyChecking=no -r images/ $ADMIN_USERNAME@$ip:/home/$ADMIN_USERNAME/

            # Execute remote configuration
            sshpass -p "$VM_PASSWORD" ssh -o StrictHostKeyChecking=no $ADMIN_USERNAME@$ip 'bash -s' <<EOF
              set -e
              # ... (rest of your existing Nginx/Setup script) ...
              echo "🎉 Deployment successful on \$(hostname)"
          EOF
          done
